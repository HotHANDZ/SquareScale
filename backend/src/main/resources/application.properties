spring.application.name=SquareScaleApplication

# Database (MySQL)
# Your SQL file is a MySQL dump for database: squarescale
spring.datasource.url=jdbc:mysql://localhost:3306/squarescale
spring.datasource.username=squarescale_app
spring.datasource.password=SquareScale123!

# JPA: create/update tables from your entities (e.g. User)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# If you still want H2 for debugging, you can re-enable these later.

# IMPORTANT: Your MySQL dump uses camelCase column names (firstName, lastName, etc.).
# This setting prevents Hibernate from automatically converting them to snake_case.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Helpful while developing (shows error messages in JSON responses)
server.error.include-message=always
