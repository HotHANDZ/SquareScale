spring.application.name=SquareScaleApplication

# Database: once you fix the DB, set the URL (and user/password if needed).
# Option A - H2 file-based (creates e.g. data/users.mv.db in project):
# spring.datasource.url=jdbc:h2:file:./data/users
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# Option B - H2 in-memory (default if nothing set; data is lost on restart):
# spring.datasource.url=jdbc:h2:mem:testdb

# JPA: create/update tables from your entities (e.g. User)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (optional; for debugging at http://localhost:8080/h2-console)
# spring.h2.console.enabled=true
