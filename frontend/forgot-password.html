<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SquareScale: Forgot Password</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>


<div class="logoSpace">
    <img src="src/images/logo.png" alt="SquareScale Logo" id="logo" style="height: 100px; width: 100px">
</div>

<form id="loginForm">


    <div class="parent-div">
        <div class="child-div">
            <label for="forgotEmail" id="forgotEmailLabel">Email:</label>
            <input type="email" id="forgotEmail" name="email" ><br>

            <label for="userID">User ID:</label>
            <input type="text" id="userID" name="userID">

            <a href="index.html">Back to Login</a><br>

            <!-- Will add security questions later -->

            <input type="submit" id="loginButton">


        </div>
    </div>

</form>


</body>
</html>
