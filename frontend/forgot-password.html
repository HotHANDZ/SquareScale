<!DOCTYPE html>
<!-- Forgot password: email + userID -> security question -> new password. See forgot-password.js and /auth/forgot/*. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SquareScale: Forgot Password</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>


<div class="logoSpace">
    <img src="src/images/logo.png" alt="SquareScale Logo" id="logo" style="height: 100px; width: 100px">
</div>

<form id="passForm">


    <div class="parent-div">
        <div class="child-div">

            <!-- User credentials -->
            <div class="child-div" id="credentials-form">
                <label for="forgotEmail" id="forgotEmailLabel">Email:</label>
                <input type="email" id="forgotEmail" name="email" ><br>

                <label for="userID">User ID:</label>
                <input type="text" id="userID" name="userID">
            </div>

            <!-- Security questions -->
            <div class="child-div hidden" id="security-question-form">

                <label for="security-question-list" id="security-question-label">Security Question:</label>
                <select id="security-question-list" name="security-question-list"></select> <br>

                <label for="security-question-answer">Answer:</label>
                <input type="text" id="security-question-answer" name="security-question-answer">

            </div>

            <!-- New Password -->
            <div class="child-div hidden" id="new-password-form">

                <label for="new-password">New Password:</label>
                <input type="password" id="new-password" name="new-password"><br>

            </div>


            <a href="index.html">Back to Login</a><br>

            <input type="submit" id="loginButton">


        </div>
    </div>

</form>

<!-- Error message -->
<p id="error-text" class="hidden"></p>

<!-- Password criteria -->
<div class="hidden" id="password-criteria">
    <p>Password must:</p>
    <ul>
        <li>Start with a letter</li>
        <li>Have a number</li>
        <li>Have a special character</li>
        <li>Be 8 characters long</li>
    </ul>
</div>

<script src="src/forgot-password.js"></script>
</body>
</html>
