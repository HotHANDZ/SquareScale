<!DOCTYPE html>
<!-- Account ledger: opened from chart of accounts row click. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SquareScale: Account Ledger</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body class="has-app-shell">
<div class="logoSpace">
    <img src="src/images/logo.png" alt="SquareScale Logo" class="logo-img">
</div>
<div id="loggedInBadge" class="user-badge">
    <img src="src/images/logo.png" alt="Profile" class="badge-img">
    <span id="loggedInUsername"></span>
</div>

<main class="home-main ledger-main">
    <h1 class="home-title">Account ledger</h1>
    <p class="home-desc" id="ledgerSubtitle">Loading…</p>

    <section class="add-user-section" id="ledgerSection">
        <h2 id="ledgerAccountTitle">—</h2>
        <div class="table-wrapper">
            <table class="admin-table" id="ledgerTable">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th class="num-cell">Debit</th>
                    <th class="num-cell">Credit</th>
                    <th class="num-cell">Balance</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <p id="ledgerMessage" class="message-text hidden"></p>
    </section>
</main>

<script src="src/app-shell.js"></script>
<script src="src/post-login.js"></script>
<script src="src/account-ledger.js"></script>
</body>
</html>
