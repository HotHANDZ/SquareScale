<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SquareScale: Login</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>

<div class="logoSpace">
    <img src="src/images/logo.png" alt="SquareScale Logo" id="logo" style="height: 100px; width: 100px">
</div>

<div id="loggedInBadge" style="position: fixed; top: 12px; right: 12px; display: none; align-items: center; gap: 10px;">
    <img src="src/images/logo.png" alt="Profile" style="height: 36px; width: 36px; border-radius: 50%;">
    <span id="loggedInUsername"></span>
</div>

<form id="loginForm">


    <div class="parent-div">
        <div class="child-div">
            <label for="userName" id="userNameLabel">Username:</label>
            <input type="text" id="userName" name="userName" ><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password">

            <div id="forgot-create">
                <a href="forgot-password.html">Forgot password</a>
                <a href="create-user.html">New User</a>
            </div><br>

            <input type="submit" value="Login" id="loginButton">


        </div>
    </div>

</form>

<script src="src/global.js"></script>
</body>
</html>
