<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SquareScale: Administrator Home</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
<div class="logoSpace">
    <img src="src/images/logo.png" alt="SquareScale Logo" id="logo" class="logo-img">
</div>
<div id="loggedInBadge" class="user-badge">
    <img src="src/images/logo.png" alt="Profile" class="badge-img">
    <span id="loggedInUsername"></span>
</div>

<main class="home-main">
    <h1 class="home-title">Administrator Home</h1>
    <p class="home-desc">This is the administrator home page. You can add users and assign roles below.</p>
    <button type="button" id="backToLogin" class="btn-back">Back to Login</button>

    <section class="add-user-section">
        <h2>Add User</h2>
        <p class="add-user-hint">Username will be generated automatically (first initial + last name + MMyy).</p>
        <form id="addUserForm" class="add-user-form">
            <label for="addFirstName">First name *</label>
            <input type="text" id="addFirstName" name="firstName" required maxlength="45">
            <label for="addLastName">Last name *</label>
            <input type="text" id="addLastName" name="lastName" required maxlength="45">
            <label for="addEmail">Email *</label>
            <input type="email" id="addEmail" name="email" required>
            <label for="addPassword">Password *</label>
            <input type="password" id="addPassword" name="password" required minlength="8" placeholder="Min 8 chars, start with letter, include letter, number, special char">
            <p id="addPasswordError" class="error-text hidden"></p>
            <label for="addRole">Role *</label>
            <select id="addRole" name="role" required>
                <option value="">Select role</option>
                <option value="ADMIN">Administrator</option>
                <option value="MANAGER">Manager</option>
                <option value="USER">Regular User (Accountant)</option>
            </select>
            <button type="submit" class="btn-submit">Create User</button>
        </form>
        <p id="addUserMessage" class="message-text hidden"></p>
    </section>
</main>

<script src="src/post-login.js"></script>
<script src="src/admin-home.js"></script>
</body>
</html>
